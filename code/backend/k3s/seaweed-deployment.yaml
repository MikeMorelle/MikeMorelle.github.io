apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: seaweed-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: seaweedfs
spec:
  type: NodePort
  selector:
    app: seaweedfs
  ports:
    - name: s3
      port: 8333
      targetPort: 8333
      nodePort: 30333
    - name: ui
      port: 8888
      targetPort: 8888
      nodePort: 30888
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: seaweedfs
spec:
  replicas: 1
  selector:
    matchLabels:
      app: seaweedfs
  template:
    metadata:
      labels:
        app: seaweedfs
    spec:
      containers:
        - name: seaweedfs
          image: chrislusf/seaweedfs
          args:
            - server
            - -dir=/data
            - -s3
          ports:
            - containerPort: 8333
            - containerPort: 8888
          volumeMounts:
            - name: seaweed-storage
              mountPath: /data
      volumes:
        - name: seaweed-storage
          # PersistentVolumeClaim ensures uploaded images survive pod restarts.
          persistentVolumeClaim:
            claimName: seaweed-pvc